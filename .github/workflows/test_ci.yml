name: Test Subtle

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      LLVM_VERSION: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-${{ env.LLVM_VERSION }} main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update
          sudo apt-get install -y clang-${{ env.LLVM_VERSION }} clang-tidy-${{ env.LLVM_VERSION }}

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=clang++-${{ env.LLVM_VERSION }}
          -DCMAKE_BUILD_TYPE=Release
          -DSUBTLE_BUILD_TESTS=ON
          -DSUBTLE_BUILD_EXAMPLES=ON
          -DSUBTLE_FETCH_DEPS=ON
          -DCLANG_TIDY_EXE=clang-tidy-${{ env.LLVM_VERSION }}

      - name: clang-tidy
        run: cmake --build build --target tidy

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [
          ubuntu-latest # x86_64
        ]
        compiler: [g++, clang++]
        sanitizer: [none, asan, ubsan, msan]
        build_type: [Debug, Release]
        include:
          - os: macos-latest # aarch64
            compiler: clang++
            sanitizer: none
            build_type: Release
        exclude:
          - sanitizer: none
            build_type: Debug
          - compiler: g++
            sanitizer: msan

    steps:
      - uses: actions/checkout@v6

      - name: Install libc++ (MSan requires instrumented C++ stdlib)
        if: ${{ matrix.sanitizer == 'msan' }}
        run: sudo apt-get update && sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DSUBTLE_BUILD_TESTS=ON
          -DSUBTLE_BUILD_EXAMPLES=ON
          -DSUBTLE_FETCH_DEPS=ON
          -DSUBTLE_ASAN=${{ matrix.sanitizer == 'asan' && 'ON' || 'OFF' }}
          -DSUBTLE_UBSAN=${{ matrix.sanitizer == 'ubsan' && 'ON' || 'OFF' }}
          -DSUBTLE_MSAN=${{ matrix.sanitizer == 'msan' && 'ON' || 'OFF' }}

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure -j

      - name: Run Examples
        if: ${{ matrix.sanitizer == 'none' && matrix.build_type == 'Release' }}
        run: |
          ./build/ct_swap_example
          ./build/ct_compare_example
          ./build/ct_copy_example

  valgrind:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v6

      - name: Install Valgrind
        run: sudo apt-get update && sudo apt-get install -y valgrind

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DSUBTLE_BUILD_TESTS=ON
          -DSUBTLE_VALGRIND=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure -j

  binsec:
    runs-on: ubuntu-latest
    container:
      image: binsec/binsec:latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [g++, clang++]
    steps:
      - uses: actions/checkout@v6

      - name: Install build tools
        run: apt-get update && apt-get install -y cmake g++ clang make

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
          -DCMAKE_BUILD_TYPE=Release
          -DSUBTLE_BUILD_TESTS=ON
          -DSUBTLE_BINSEC=ON

      - name: Build
        run: cmake --build build -j

      - name: Binsec Verify
        run: cmake --build build --target binsec_verify
